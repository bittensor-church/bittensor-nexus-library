[project]
name = "cat-images-subnet"

dynamic = ["version"]
description = "A PoC subnet that adds pictures of cats to user-supplied images"
authors = [
    { name = "Reef", email = "reef@reef.sh" }
]
requires-python = ">=3.14"
dependencies = [
    "pydantic-settings",
    "pydantic",
    "litestar[standard,prometheus]",
    "bittensor-nexus-lib",
    "basedpyright>=1.36.1",
    "ruff>=0.14.8",
    "ty>=0.0.1a32",
]

[project.optional-dependencies]
dev = [
#    "freezegun",
    "uv",
#    "nox",
    "pytest",
    "pytest-asyncio>=1.0.0",
#    "pytest-httpx",
#    "turbobt>=0.2.2",
#    "respx>=0.22.0",
#    "polyfactory>=2.22.2",
]
format = [
    "ruff",
    "ty", 
    "pyright",
    "freezegun",
    "sentry-sdk[litestar]"
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = [
    "E", "F", "I", "UP", "B", "TC005",
]
ignore = [
    "D100", "D105", "D107", "D200", "D202", "D203", "D205", "D212", "D400", "D401", "D415",
    "D101", "D102","D103", "D104",
    "E501", "B027", "B904", "B905",
]
preview = true
explicit-preview-rules = true
extend-select = ["DOC501"]

[tool.ruff.lint.per-file-ignores]

"__init__.py" = ["I", "F401"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
]

[project.urls]
homepage = "https://github.com/bittensor-church/nexus-poc"
repository = "https://github.com/bittensor-church/nexus-poc"
documentation = "https://github.com/bittensor-church/nexus-poc#readme"

[tool.uv]

[tool.uv.sources]
bittensor-nexus-lib = { path = "../nexus-template" }
# uv-specific settings can go here

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "strict"
include = ["cat_images_subnet"]
useLibraryCodeForTypes = true
reportMissingTypeStubs = "warning"
reportUndefinedVariable = "error"
reportUnusedImport = "warning"
