<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Catificator{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f8f9fa; color: #333; }
        h1, h2 { margin-bottom: 1rem; }
        a { color: #4a90d9; }
        nav { margin-bottom: 2rem; display: flex; gap: 1rem; }
        nav a { text-decoration: none; padding: 0.5rem 1rem; background: #fff; border-radius: 4px; border: 1px solid #ddd; }
        nav a:hover { background: #e9ecef; }
        .card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #ddd; }
        button, input[type="submit"] { cursor: pointer; padding: 0.5rem 1.5rem; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 1rem; }
        button:hover, input[type="submit"]:hover { background: #357abd; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #c82333; }
        button.secondary { background: #6c757d; }
        select, input[type="file"] { padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        .preview-img { max-width: 300px; max-height: 300px; border-radius: 4px; margin: 0.5rem 0; }
        .status-frame { position: relative; overflow: hidden; }
        .status-frame > img { transition: opacity 0.8s ease, filter 1.2s ease; }
        .status-frame.active > img { opacity: 0.3; filter: blur(12px); }
        .status-overlay { position: absolute; inset: 0; display: flex; align-items: flex-end; padding: 1.5rem; }
        .status-log { width: 100%; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 0.75rem; border-radius: 8px; background: rgba(255,255,255,0.9); mask-image: linear-gradient(to bottom, transparent 0%, black 40%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%); }
        .big-btn { display: block; width: fit-content; margin: 1.5rem auto 0; padding: 0.8rem 3rem; font-size: 1.2rem; text-decoration: none; text-align: center; cursor: pointer; background: #4a90d9; color: #fff; border: none; border-radius: 4px; }
        .big-btn:hover { background: #357abd; }
        .status-entry { padding: 0.25rem 0; border-bottom: 1px solid #eee; }
        .result-area img { max-width: 100%; border-radius: 4px; margin: 0.5rem 0; }
        .error-box { background: #f8d7da; color: #721c24; padding: 1rem; border-radius: 4px; border: 1px solid #f5c6cb; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.8rem; font-weight: bold; }
        .badge-ok { background: #d4edda; color: #155724; }
        .badge-off { background: #f8d7da; color: #721c24; }
        .badge-progress { background: #cce5ff; color: #004085; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-failed { background: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        .dropzone { border: 3px dashed #ccc; border-radius: 12px; height: 400px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #fff; }
        .dropzone:hover, .dropzone-hover { border-color: #4a90d9; background: #f0f6ff; }
        .dropzone-label { font-size: 1.2rem; color: #888; pointer-events: none; }
        .image-frame { height: 400px; display: flex; align-items: center; justify-content: center; padding: 1.5rem; border: 3px solid #ccc; border-radius: 12px; background: #fff; }
        .image-frame img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }

        @media (prefers-color-scheme: dark) {
            body { background: #1a1a2e; color: #e0e0e0; }
            .card, .dropzone, .image-frame { background: #16213e; border-color: #444; }
            .dropzone:hover, .dropzone-hover { border-color: #4a90d9; background: #1a1a3e; }
            nav a { background: #16213e; border-color: #444; color: #7eb8f7; }
            nav a:hover { background: #1f2b47; }
            .status-log { background: rgba(22,33,62,0.92); color: #e0e0e0; }
            .status-entry { border-bottom-color: #333; }
            .error-box { background: #3b1c22; color: #f5a5a5; border-color: #5a2a2a; }
            button, input[type="submit"], .big-btn { background: #4a90d9; }
            button:hover, input[type="submit"]:hover, .big-btn:hover { background: #357abd; }
            th, td { border-bottom-color: #333; }
            select, input[type="file"] { background: #16213e; border-color: #444; color: #e0e0e0; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Catify</a>
        <a href="/jobs">Jobs</a>
        <a href="/validators">Validators</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
