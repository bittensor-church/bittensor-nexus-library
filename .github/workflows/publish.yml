name: Continuous Deployment

# This workflow requires https://docs.pypi.org/trusted-publishers/ to be enabled for the repository.
# Follow instructions from this link to enable it.
# Use this workflow (`publish.yml`) in the configuration.
# Please note this process has to be repeated for Test PyPI and PyPI separately.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  publish-pypi:
    permissions:
      id-token: write  # allows publishing to PyPI
      contents: write  # allows uploading a GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}

      - name: Detect release type
        id: release-type
        uses: ./.github/actions/detect-release-type

      - uses: ./.github/actions/setup-uv-nox
        if: steps.release-type.outputs.type != 'unknown'

      - name: Build
        if: steps.release-type.outputs.type != 'unknown'
        run: uv build

      - name: Create GitHub release
        id: create-release
        if: steps.release-type.outputs.type != 'unknown'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          prerelease: ${{ steps.release-type.outputs.type == 'prerelease' }}
          generate_release_notes: true
          files: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Publish distribution 📦 to TestPyPI
        if: steps.release-type.outputs.type == 'prerelease'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish distribution 📦 to PyPI
        if: steps.release-type.outputs.type == 'release'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

