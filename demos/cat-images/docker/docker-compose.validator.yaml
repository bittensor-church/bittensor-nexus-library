name: cat-images-validator

services:
  pylon:
    image: backenddevelopersltd/bittensor-pylon:2.1.0
    restart: unless-stopped
    environment:
      # Pylon HTTP API server.
      PYLON_UVICORN_HOST: "0.0.0.0"
      PYLON_UVICORN_PORT: "8000"
      # Chain config (override in .env if needed).
      PYLON_BITTENSOR_NETWORK: ${PYLON_BITTENSOR_NETWORK:-http://host.docker.internal:9944}
      # Open-access recent-object cache configuration for subnet routing.
      PYLON_RECENT_OBJECTS_NETUIDS: "${PYLON_RECENT_OBJECTS_NETUIDS:-[2]}"
      # Open-access token used by validator's pylon client.
      PYLON_OPEN_ACCESS_TOKEN: ${PYLON_OPEN_ACCESS_TOKEN:-local-open-access-token}
      # Identities for write operations (weights) and mTLS cert management.
      # Add "miner" to PYLON_IDENTITIES and set PYLON_ID_MINER_* to enable mTLS.
      PYLON_IDENTITIES: "${PYLON_IDENTITIES:-[\"validator\"]}"
      PYLON_ID_VALIDATOR_WALLET_NAME: ${PYLON_ID_VALIDATOR_WALLET_NAME:-cat-images-validator-kuba}
      PYLON_ID_VALIDATOR_HOTKEY_NAME: ${PYLON_ID_VALIDATOR_HOTKEY_NAME:-default}
      PYLON_ID_VALIDATOR_NETUID: ${PYLON_ID_VALIDATOR_NETUID:-2}
      PYLON_ID_VALIDATOR_TOKEN: ${PYLON_ID_VALIDATOR_TOKEN:?set PYLON_ID_VALIDATOR_TOKEN}
      PYLON_ID_MINER_WALLET_NAME: ${PYLON_ID_MINER_WALLET_NAME:-}
      PYLON_ID_MINER_HOTKEY_NAME: ${PYLON_ID_MINER_HOTKEY_NAME:-default}
      PYLON_ID_MINER_NETUID: ${PYLON_ID_MINER_NETUID:-2}
      PYLON_ID_MINER_TOKEN: ${PYLON_ID_MINER_TOKEN:-}
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      validator_net:
        ipv4_address: ${PYLON_CONTAINER_IP:-172.30.0.20}
    # Optional host debug access; bound to localhost only.
    ports:
      - "127.0.0.1:${PYLON_HOST_PORT:-18000}:8000"

  # Used for one-time validator cert generation only. Requires pylon to be running.
  # Run: bash docker/generate_validator_certs.sh <SS58>
  nexus_auth:
    image: backenddevelopersltd/nexus-auth:latest
    volumes:
      - ./certs/validator:/app/certs
    environment:
      NEXUS_PYLON_ENDPOINT: http://pylon:8000
      NEXUS_PYLON_NETUID: ${VALIDATOR_NETUID:-2}
      NEXUS_PYLON_IDENTITY_NAME: ${VALIDATOR_PYLON_IDENTITY_NAME:-validator}
      NEXUS_PYLON_IDENTITY_TOKEN: ${PYLON_ID_VALIDATOR_TOKEN:?set PYLON_ID_VALIDATOR_TOKEN}
    depends_on:
      - pylon
    networks:
      - validator_net

  validator:
    image: ${VALIDATOR_IMAGE:-cat-validator:compose}
    build:
      context: ..
      dockerfile: docker/validator.Dockerfile
      additional_contexts:
        nexus-lib: ../../..
    restart: unless-stopped
    depends_on:
      - pylon
    environment:
      # Required validator settings.
      VALIDATOR_NETUID: ${VALIDATOR_NETUID:-2}
      VALIDATOR_OPENROUTER_API_KEY: ${VALIDATOR_OPENROUTER_API_KEY:?set VALIDATOR_OPENROUTER_API_KEY}
      VALIDATOR_EXTERNAL_IP: ${VALIDATOR_CONTAINER_IP:-172.30.0.10}
      VALIDATOR_PYLON_SERVICE_ADDRESS: ${VALIDATOR_PYLON_SERVICE_ADDRESS:-http://pylon:8000}
      VALIDATOR_PYLON_OPEN_ACCESS_TOKEN: ${PYLON_OPEN_ACCESS_TOKEN:-local-open-access-token}
      VALIDATOR_PYLON_IDENTITY_NAME: ${VALIDATOR_PYLON_IDENTITY_NAME:-validator}
      VALIDATOR_PYLON_IDENTITY_TOKEN: ${PYLON_ID_VALIDATOR_TOKEN:?set PYLON_ID_VALIDATOR_TOKEN}
      VALIDATOR_REST_ENTRY_POINT_PORT: ${VALIDATOR_REST_ENTRY_POINT_PORT:-8081}
      VALIDATOR_MINER_CALLBACK_PORT: ${VALIDATOR_MINER_CALLBACK_PORT:-9091}
      VALIDATOR_OPENROUTER_URL: ${VALIDATOR_OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      VALIDATOR_OPENROUTER_MODEL: ${VALIDATOR_OPENROUTER_MODEL:-google/gemini-2.5-flash-image}
      VALIDATOR_VALIDATION_PROMPT: ${VALIDATOR_VALIDATION_PROMPT:-}
      VALIDATOR_OPENROUTER_TIMEOUT_SECONDS: ${VALIDATOR_OPENROUTER_TIMEOUT_SECONDS:-120.0}
      VALIDATOR_OPENROUTER_TEMPERATURE: ${VALIDATOR_OPENROUTER_TEMPERATURE:-0.0}
      VALIDATOR_S3_BUCKET: ${VALIDATOR_S3_BUCKET:-my-cat-images-bucket}
      # mTLS: set these after running generate_validator_certs.sh
      VALIDATOR_MTLS_CERT_PATH: ${VALIDATOR_MTLS_CERT_PATH:-}
      VALIDATOR_MTLS_KEY_PATH: ${VALIDATOR_MTLS_KEY_PATH:-}

      # Required AWS/Boto credentials.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./certs/validator:/certs:ro
    networks:
      validator_net:
        ipv4_address: ${VALIDATOR_CONTAINER_IP:-172.30.0.10}
    ports:
      # Bind on localhost so host machine can reach validator, but not the internet.
      - "127.0.0.1:${VALIDATOR_REST_ENTRY_POINT_PORT:-8081}:${VALIDATOR_REST_ENTRY_POINT_PORT:-8081}"
      - "127.0.0.1:${VALIDATOR_MINER_CALLBACK_PORT:-9091}:${VALIDATOR_MINER_CALLBACK_PORT:-9091}"

networks:
  validator_net:
    name: ${VALIDATOR_DOCKER_NETWORK:-cat-images-validator-net}
    driver: bridge
    ipam:
      config:
        - subnet: ${VALIDATOR_DOCKER_SUBNET:-172.30.0.0/24}
