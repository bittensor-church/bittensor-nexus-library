name: cat-images-miner

services:
  # Validates incoming validator client certs via Pylon on every request.
  nexus_auth_miner:
    image: backenddevelopersltd/nexus-auth:latest
    restart: unless-stopped
    volumes:
      - ./certs/miner:/app/certs
    environment:
      NEXUS_PYLON_ENDPOINT: ${MINER_PYLON_ENDPOINT:?set MINER_PYLON_ENDPOINT}
      NEXUS_PYLON_NETUID: ${MINER_NETUID:?set MINER_NETUID}
      NEXUS_PYLON_IDENTITY_NAME: ${MINER_PYLON_IDENTITY_NAME:-miner}
      NEXUS_PYLON_IDENTITY_TOKEN: ${MINER_PYLON_IDENTITY_TOKEN:?set MINER_PYLON_IDENTITY_TOKEN}
    networks:
      - validator_net

  # TLS termination + client cert enforcement. Proxies validated traffic to miner:9090.
  nginx:
    image: nginx:alpine
    ports:
      - "${MINER_HOST_BIND_IP:-0.0.0.0}:${MINER_HOST_PORT:-8443}:8443"
    volumes:
      - ./nginx/default.compose.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/miner:/etc/nginx/ssl:ro
    depends_on:
      - miner
      - nexus_auth_miner
    restart: unless-stopped
    networks:
      validator_net:
        ipv4_address: ${MINER_CONTAINER_IP:-172.30.0.30}

  miner:
    image: ${MINER_IMAGE:-cat-miner:latest}
    build:
      context: ..
      dockerfile: docker/miner.Dockerfile
      additional_contexts:
        nexus-lib: ../../..
    container_name: ${MINER_CONTAINER_NAME:-cat-miner}
    restart: unless-stopped
    environment:
      - MINER_OPENROUTER_API_KEY=${MINER_OPENROUTER_API_KEY:?set MINER_OPENROUTER_API_KEY}
      - MINER_OPENROUTER_URL=${MINER_OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      - MINER_OPENROUTER_MODEL=${MINER_OPENROUTER_MODEL:-google/gemini-2.5-flash-image}
      - MINER_PROMPT
      - MINER_PORT=${MINER_PORT:-9090}
      - MINER_PATH=${MINER_PATH:-/process}
      - MINER_UPDATE_AXON=${MINER_UPDATE_AXON:-false}
      - MINER_WALLET_NAME=${MINER_WALLET_NAME:-default}
      - MINER_HOTKEY_NAME=${MINER_HOTKEY_NAME:-default}
      - MINER_SUBTENSOR_NETWORK=${MINER_SUBTENSOR_NETWORK:-finney}
      - MINER_NETUID
      - MINER_EXTERNAL_IP
      - MINER_EXTERNAL_PORT
      - MINER_SERVE_INTERVAL
    volumes:
      - "${MINER_WALLET_DIR:-${HOME}/.bittensor}:/root/.bittensor"
    networks:
      - validator_net

networks:
  validator_net:
    external: true
    name: ${MINER_DOCKER_NETWORK:-cat-images-validator-net}
