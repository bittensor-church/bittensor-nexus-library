server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/client.crt;
    ssl_certificate_key /etc/nginx/ssl/client.key;

    # Request a client cert but don't verify the CA — nexus_auth handles validation
    ssl_verify_client optional_no_ca;

    access_log /dev/stdout;
    error_log  /dev/stderr info;

    location / {
        auth_request /auth;
        auth_request_set $auth_status $upstream_status;
        auth_request_set $client_hotkey $upstream_http_x_hotkey;

        proxy_pass         http://miner:9090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Hotkey $client_hotkey;
    }

    location = /auth {
        internal;

        proxy_pass             http://nexus_auth_miner:8080;
        proxy_pass_request_body off;

        proxy_set_header Content-Length    "";
        proxy_set_header Host              $host;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Original-Method $request_method;

        proxy_set_header X-Client-Cert        $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer  $ssl_client_i_dn;
    }
}
